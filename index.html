<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာ Premium Free VPN Keys Finder</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #34a853;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #202124;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text); 
        }
        .container { max-width: 550px; margin: 0 auto; }
        
        /* Header Box Design */
        .header-box {
            text-align: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 25px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .subtitle { margin-top: 8px; font-size: 13px; opacity: 0.9; }
        
        .btn-refresh { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 2px 5px rgba(26,115,232,0.3);
            transition: 0.2s;
        }
        .btn-refresh:active { transform: scale(0.98); }
        
        .loading { 
            text-align: center; 
            font-weight: bold; 
            color: #5f6368; 
            padding: 30px; 
            display: none; 
        }
        
        /* Premium VPN Card Style */
        .vpn-card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            padding: 16px; 
            margin-bottom: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 6px solid var(--success);
        }
        .vpn-info b { font-size: 16px; color: #111; display: block; margin-bottom: 4px; }
        .vpn-info div { font-size: 12px; color: #5f6368; }
        .badge { 
            display: inline-block; 
            padding: 3px 8px; 
            background: #e8f0fe; 
            color: var(--primary); 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
            margin-top: 5px;
        }
        .btn-copy { 
            padding: 10px 16px; 
            background-color: var(--success); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px; 
            box-shadow: 0 2px 4px rgba(52,168,83,0.2);
        }
        .btn-copy:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>🇲🇲 Premium VPN Keys Finder</h1>
        <div class="subtitle">မြန်မာပြည်အတွက် အပိတ်ရခက်ပြီး လိုင်းအငြိမ်ဆုံး V2Ray / Shadowsocks သော့ချက်များ</div>
    </div>
    
    <button class="btn-refresh" onclick="fetchVPNKeys()">🔄 လိုင်းအငြိမ်ဆုံး Key များ ရှာမည်</button>
    
    <div id="loadingStatus" class="loading">⏳ Server များထံမှ အပိတ်ရခက်သော နည်းပညာသစ် သော့ချက်များကို ရှာဖွေနေပါသည် ဆရာသမား...</div>
    <div id="vpnListDisplay"></div>
</div>

<script>
    // ⚠️ ဆရာ့ရဲ့ Render Backend API URL
    const BACKEND_URL = "https://japanv.onrender.com/api/vpnkeys"; 

    // ကီးများကို ခေတ္တသိမ်းထားရန် Global Store
    window.vpnDataStore = {};

    async function fetchVPNKeys() {
        const listDisplay = document.getElementById("vpnListDisplay");
        const loading = document.getElementById("loadingStatus");
        
        listDisplay.innerHTML = "";
        loading.style.display = "block";
        
        try {
            const response = await fetch(BACKEND_URL);
            const resData = await response.json();
            loading.style.display = "none";
            
            if(resData.status === "success" && resData.data.length > 0) {
                window.vpnDataStore = {}; // ရှင်းလင်းရေးလုပ်ခြင်း
                
                resData.data.forEach((vpn, index) => {
                    // ကီးစာသားများကို Memory ထဲသို့ ထည့်သွင်းခြင်း
                    window.vpnDataStore[index] = vpn.config_b64;

                    // ကတ်ပြားပုံစံအလိုက် UI ချပြခြင်း
                    listDisplay.innerHTML += `
                        <div class="vpn-card" style="border-left-color: ${vpn.type === 'SS' ? '#f39c12' : '#34a853'}">
                            <div class="vpn-info">
                                <b>📍 ${vpn.country}</b> 
                                <div>🌐 Protocol: <span class="badge">${vpn.type} Node</span></div>
                            </div>
                            <button class="btn-copy" style="background-color: ${vpn.type === 'SS' ? '#f39c12' : '#34a853'}" onclick="copyV2RayKey(${index})">📋 Copy Key</button>
                        </div>
                    `;
                });
            } else {
                listDisplay.innerHTML = "<p style='text-align:center; color:red; padding:20px;'>လတ်တလော လိုင်းကောင်းသော သော့ချက်များ ရှာမတွေ့သေးပါ။ ခဏနေမှ ပြန်စမ်းပါ ဆရာ။</p>";
            }
        } catch (error) {
            loading.style.display = "none";
            listDisplay.innerHTML = "<p style='text-align:center; color:red; padding:20px;'>⚠️ Backend Server သို့ ချိတ်ဆက်၍ မရနိုင်ဖြစ်နေပါသည် ဆရာသမား။</p>";
            console.error(error);
        }
    }

    // ကီးများကို စာသားအဖြစ် အမှားအယွင်းမရှိ ကော်ပီကူးယူပေးမည့် စနစ်
    function copyV2RayKey(index) {
        try {
            const base64Str = window.vpnDataStore[index];
            if (!base64Str) return;

            // မူရင်း vmess:// သို့မဟုတ် ss:// လင့်ခ်စာသားကို ပြန်ဖော်ခြင်း
            const actualKey = atob(base64Str.trim());
            
            // Clipboard ထဲသို့ ကူးထည့်ခြင်း
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = actualKey;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand("copy");
            document.body.removeChild(tempTextArea);

            alert("✅ VPN Key ကို ကော်ပီကူးယူပြီးပါပြီ ဆရာသမား။\n\nv2rayNG သို့မဟုတ် Nekobox အက်ပ်ထဲတွင် '+' ကိုနှိပ်ပြီး 'Import config from Clipboard' လုပ်ကာ ချိတ်ဆက်နိုင်ပါပြီဗျာ။");
        } catch(e) {
            alert("❌ ကော်ပီကူးရာတွင် အမှားအယွင်းရှိသွားပါသည်။");
            console.error(e);
        }
    }

    // အက်ပ်ဖွင့်ဖွင့်ချင်း အလိုအလျောက် သော့ချက်ရှာခိုင်းခြင်း
    window.onload = fetchVPNKeys;
</script>
</body>
</html>
